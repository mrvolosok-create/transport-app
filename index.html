<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>РЕЙС ОК | LUXURY EDITION</title>
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --apple-pink: #ff2d55;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-active: rgba(255, 45, 85, 0.2);
            --border: rgba(255, 255, 255, 0.1);
        }

        body { 
            background: #000; 
            color: #fff; 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; 
            padding: 20px;
            overflow-x: hidden;
        }

        /* Горизонтальный скролл городов */
        .city-picker {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 12px;
            padding: 10px 5px 25px 5px;
            margin: 0 -20px; /* Чтобы скролл шел от края до края */
            padding-left: 20px;
            scrollbar-width: none; /* Убираем полосу скролла */
        }
        .city-picker::-webkit-scrollbar { display: none; }

        .city-card {
            flex: 0 0 140px; /* Ширина карточки */
            height: 100px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            scroll-snap-align: center;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .city-card span {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.5px;
            opacity: 0.6;
        }

        .city-card.active {
            background: var(--glass-active);
            border-color: var(--apple-pink);
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(255, 45, 85, 0.15);
        }

        .city-card.active span { opacity: 1; color: var(--apple-pink); }

        /* Стили остальных полей (укрупненные) */
        .label { color: #8e8e93; font-size: 13px; font-weight: 600; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .input-group { margin-bottom: 30px; }
        
        input { 
            width: 100%; background: var(--glass); border: 1px solid var(--border); color: #fff; 
            padding: 22px; border-radius: 18px; box-sizing: border-box; font-size: 18px; font-weight: 500;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }

        .btn { 
            width: 100%; background: var(--apple-pink); color: #fff; border: none; padding: 24px; 
            font-weight: 700; border-radius: 20px; font-size: 18px; margin-top: 10px;
            box-shadow: 0 10px 25px rgba(255, 45, 85, 0.3);
        }
    </style>
</head>
<body>
    <div style="margin-bottom: 30px;">
        <h1 style="margin: 0; font-size: 36px; font-weight: 800; font-style: italic;">РЕЙС ОК</h1>
        <p style="margin: 5px 0; color: var(--apple-pink); font-weight: 700; letter-spacing: 2px; font-size: 12px;">PREMIUM LOGISTICS</p>
    </div>

    <div class="input-group">
        <div class="label">Выбор города</div>
        <div class="city-picker" id="cityContainer">
            <!-- Города добавятся через JS -->
        </div>
    </div>

    <div class="input-group">
        <div class="label">Дата отгрузки</div>
        <input type="date" id="date">
    </div>

    <div class="input-group">
        <div class="label">Организация</div>
        <input type="text" id="company" placeholder="ИНН или Название">
    </div>

    <div class="input-group">
        <div class="label">Ваш телефон</div>
        <input type="tel" id="phone" placeholder="+7 (___) ___-__-__">
    </div>

    <button class="btn" id="send">ЗАБРОНИРОВАТЬ</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const cities = ["Коледино", "Казань", "Электросталь", "Тула", "Подольск", "Краснодар", "Воронеж", "Шушары", "Екатеринбург"];
        let selectedCity = "";

        // Генерация карточек городов
        const container = document.getElementById('cityContainer');
        cities.forEach(name => {
            const card = document.createElement('div');
            card.className = 'city-card';
            card.innerHTML = `<span>${name}</span>`;
            card.onclick = () => {
                document.querySelectorAll('.city-card').forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                selectedCity = name;
                tg.HapticFeedback.impactOccurred('light');
            };
            container.appendChild(card);
        });

        // Кнопка отправить
        document.getElementById('send').addEventListener('click', () => {
            const data = {
                city: selectedCity,
                date: document.getElementById('date').value,
                company: document.getElementById('company').value,
                phone: document.getElementById('phone').value
            };
            
            if (!selectedCity || !data.phone) {
                tg.HapticFeedback.notificationOccurred('error');
                tg.showAlert("Выберите город и введите телефон");
                return;
            }

            tg.HapticFeedback.impactOccurred('medium');
            tg.sendData(JSON.stringify(data));
        });
    </script>
</body>
</html>
