<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --neon-pink: #ff0095;
            --deep-black: #050505;
            --accent-gray: #1a1a1a;
        }

        body { 
            font-family: 'Inter', 'Impact', sans-serif; 
            padding: 20px; 
            color: #ffffff; 
            background-color: var(--deep-black);
            margin: 0;
            overflow-x: hidden;
        }

        /* Агрессивный заголовок с наклоном */
        .header {
            text-align: left;
            margin-bottom: 30px;
            transform: skewX(-10deg);
            border-left: 5px solid var(--neon-pink);
            padding-left: 15px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 900;
            margin: 0;
            line-height: 1;
            text-transform: uppercase;
            font-style: italic;
            text-shadow: 3px 3px 0px var(--neon-pink);
        }

        .header p {
            font-size: 14px;
            color: var(--neon-pink);
            font-weight: bold;
            margin: 5px 0 0 0;
            letter-spacing: 2px;
        }

        .form-group { margin-bottom: 20px; }

        label { 
            display: block; 
            margin-bottom: 8px; 
            font-size: 12px; 
            font-weight: 900;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Инпуты с острыми углами */
        input, select { 
            width: 100%; 
            padding: 16px; 
            border-radius: 0px; /* Острые углы для агрессии */
            border: none;
            border-bottom: 2px solid #333;
            box-sizing: border-box; 
            background: var(--accent-gray); 
            color: #ffffff; 
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            border-bottom: 2px solid var(--neon-pink);
            background: #222;
            outline: none;
        }

        /* Кнопка "ГАЗ В ПОЛ" */
        button { 
            width: 100%; 
            padding: 20px; 
            background: var(--neon-pink); 
            color: white; 
            border: none; 
            border-radius: 0px;
            cursor: pointer; 
            font-weight: 900; 
            font-size: 20px; 
            text-transform: uppercase;
            font-style: italic;
            letter-spacing: 2px;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: -5px 5px 0px #8a0051;
            transition: all 0.1s;
        }

        button:active {
            transform: translate(-3px, 3px);
            box-shadow: 0px 0px 0px #8a0051;
        }

        button::after {
            content: " >>>";
            font-size: 14px;
            opacity: 0.7;
        }

        /* Кастомный календарь */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>РЕЙС ОК</h1>
        <p>ДОСТАВКА НА СКЛАДЫ WB</p>
    </div>
    
    <div class="form-group">
        <label>Город отгрузки</label>
        <input type="text" id="city" placeholder="ОТКУДА ГОНИМ?">
    </div>

    <div class="form-group">
        <label>Дата отгрузки</label>
        <input type="date" id="date">
    </div>

    <div class="form-group">
        <label>Тип поставки</label>
        <select id="type">
            <option value="Короб">📦 КОРОБ</option>
            <option value="Паллета">🧱 ПАЛЛЕТА</option>
        </select>
    </div>

    <div class="form-group">
        <label>Количество</label>
        <input type="number" id="qty" placeholder="СКОЛЬКО ВЕЗЕМ?">
    </div>

    <div class="form-group">
        <label>Организация</label>
        <input type="text" id="company" placeholder="НАЗВАНИЕ КОМПАНИИ">
    </div>

    <div class="form-group">
        <label>Контактный телефон</label>
        <input type="tel" id="phone" placeholder="+7 (___) ___-__-__">
    </div>

    <button onclick="sendData()">ОТПРАВИТЬ ЗАЯВКУ</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = '#050505';

        function sendData() {
            let data = {
                city: document.getElementById('city').value,
                date: document.getElementById('date').value,
                type: document.getElementById('type').value,
                qty: document.getElementById('qty').value,
                company: document.getElementById('company').value,
                phone: document.getElementById('phone').value
            };

            if (!data.city || !data.phone || !data.company) {
                tg.HapticFeedback.notificationOccurred('error');
                alert("ЗАПОЛНИ ВСЕ ПОЛЯ!");
                return;
            }

            tg.HapticFeedback.impactOccurred('heavy'); // Виброотклик при нажатии
            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
