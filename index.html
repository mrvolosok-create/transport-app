<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 20px; color: var(--tg-theme-text-color); background: var(--tg-theme-bg-color); }
        h3 { text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; opacity: 0.8; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; background: var(--tg-theme-secondary-bg-color); color: var(--tg-theme-text-color); }
        button { width: 100%; padding: 15px; background: #248b91; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 16px; }
    </style>
</head>
<body>
    <h3>Оформление заявки</h3>
    
    <div class="form-group">
        <label>Город отгрузки</label>
        <input type="text" id="city" placeholder="Например: Москва">
    </div>

    <div class="form-group">
        <label>Дата отгрузки</label>
        <input type="date" id="date">
    </div>

    <div class="form-group">
        <label>Тип поставки</label>
        <select id="type">
            <option value="Короб">Короб</option>
            <option value="Паллета">Паллета</option>
        </select>
    </div>

    <div class="form-group">
        <label>Количество</label>
        <input type="number" id="qty" placeholder="0">
    </div>

    <div class="form-group">
        <label>Название организации</label>
        <input type="text" id="company" placeholder="ООО ТРАНСПОРТ">
    </div>

    <div class="form-group">
        <label>Номер телефона</label>
        <input type="tel" id="phone" placeholder="+7 999 000 00 00">
    </div>

    <button onclick="sendData()">Отправить заявку</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Разворачивает окно на весь экран

        function sendData() {
            let data = {
                city: document.getElementById('city').value,
                date: document.getElementById('date').value,
                type: document.getElementById('type').value,
                qty: document.getElementById('qty').value,
                company: document.getElementById('company').value,
                phone: document.getElementById('phone').value
            };

            // Проверка на заполнение полей
            if (!data.city || !data.phone || !data.company) {
                alert("Пожалуйста, заполните основные поля!");
                return;
            }

            tg.sendData(JSON.stringify(data)); // Отправляет JSON боту
            tg.close();
        }
    </script>
</body>
</html>
