<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>РЕЙС ОК - Доставка на склады WB</title>
    <script src="https://telegram.org"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; text-transform: uppercase; }
        .header { color: #ff007a; font-weight: bold; font-style: italic; font-size: 24px; margin-bottom: 5px; }
        .sub-header { color: #ff007a; font-size: 10px; margin-bottom: 20px; }
        .label { color: #888; font-size: 10px; margin-bottom: 5px; font-weight: bold; }
        input, select { 
            width: 100%; background: #1a1a1a; border: 1px solid #333; color: #fff; 
            padding: 12px; margin-bottom: 15px; border-radius: 4px; box-sizing: border-box;
        }
        input::placeholder { color: #555; font-weight: bold; }
        .btn { 
            width: 100%; background: #ff007a; color: #fff; border: none; padding: 15px; 
            font-weight: bold; cursor: pointer; border-radius: 4px; margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="header">РЕЙС ОК</div>
    <div class="sub-header">ДОСТАВКА НА СКЛАДЫ WB</div>

    <div class="label">ГОРОД ОТГРУЗКИ</div>
    <input type="text" id="city" placeholder="ОТКУДА ГОНИМ?">

    <div class="label">ДАТА ОТГРУЗКИ</div>
    <input type="date" id="date" value="2026-03-02">

    <div class="label">ТИП ПОСТАВКИ</div>
    <select id="type">
        <option value="КОРОБ">📦 КОРОБ</option>
        <option value="МОНОПАЛЛЕТ">🏗️ МОНОПАЛЛЕТ</option>
    </select>

    <div class="label">КОЛИЧЕСТВО</div>
    <input type="number" id="qty" placeholder="СКОЛЬКО ВЕЗЕМ?">

    <div class="label">ОРГАНИЗАЦИЯ</div>
    <input type="text" id="company" placeholder="НАЗВАНИЕ КОМПАНИИ">

    <div class="label">КОНТАКТНЫЙ ТЕЛЕФОН</div>
    <input type="tel" id="phone" placeholder="+7 (___) ___-__-__">

    <button class="btn" id="send">ОТПРАВИТЬ ЗАЯВКУ >>></button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        document.getElementById('send').addEventListener('click', () => {
            let data = {
                city: document.getElementById('city').value,
                date: document.getElementById('date').value,
                type: document.getElementById('type').value,
                qty: document.getElementById('qty').value,
                company: document.getElementById('company').value,
                phone: document.getElementById('phone').value
            };
            
            // Проверка на пустые поля
            if (!data.city || !data.phone) {
                alert("Заполни все поля!");
                return;
            }

            tg.sendData(JSON.stringify(data)); // Отправляем JSON в Python-бот
        });
    </script>
</body>
</html>
