<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>РЕЙС ОК | APPLE STYLE</title>
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --apple-pink: #ff2d55;
            --apple-bg: #000000;
            --card-bg: rgba(28, 28, 30, 0.7); /* Цвет системных карточек iOS */
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body { 
            background-color: var(--apple-bg); 
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 24px;
            -webkit-font-smoothing: antialiased;
        }

        /* Заголовок в стиле Apple */
        .header-section { margin-bottom: 35px; margin-top: 10px; }
        .header { 
            font-size: 34px; 
            font-weight: 800; 
            letter-spacing: -0.5px;
            color: #fff;
        }
        .sub-header { 
            color: var(--apple-pink); 
            font-size: 12px; 
            letter-spacing: 2px; 
            font-weight: 600;
            margin-top: 4px;
            text-transform: uppercase;
        }

        /* Крупные плашки ввода */
        .input-group { margin-bottom: 24px; }
        .label { 
            color: #8e8e93; /* Текст подписей iOS */
            font-size: 13px; 
            margin-bottom: 10px; 
            font-weight: 500; 
            padding-left: 4px;
            text-transform: uppercase;
        }
        
        input, select { 
            width: 100%; 
            background: var(--card-bg); 
            border: 1px solid var(--border-color); 
            color: #fff; 
            padding: 20px; /* Увеличил высоту плашек */
            border-radius: 16px; /* Мягкие углы Apple */
            box-sizing: border-box; 
            font-size: 17px; /* Системный размер текста iOS */
            backdrop-filter: blur(20px); /* Сильное размытие */
            -webkit-backdrop-filter: blur(20px);
            transition: all 0.2s ease-in-out;
            appearance: none; /* Убираем стандартные стрелки */
        }

        input:focus { 
            border-color: var(--apple-pink); 
            background: rgba(44, 44, 46, 0.9);
            outline: none;
        }

        /* Кастомная стрелочка для select */
        .select-wrapper { position: relative; }
        .select-wrapper::after {
            content: '▼';
            font-size: 12px;
            color: #8e8e93;
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        /* Кнопка в стиле iOS */
        .btn { 
            width: 100%; 
            background: var(--apple-pink);
            color: #fff; 
            border: none; 
            padding: 22px; 
            font-weight: 600; 
            cursor: pointer; 
            border-radius: 18px; 
            margin-top: 20px; 
            font-size: 17px;
            letter-spacing: -0.2px;
            transition: all 0.2s ease;
        }
        .btn:active { 
            transform: scale(0.97); 
            opacity: 0.8; 
        }

        option { background: #1c1c1e; color: #fff; }
    </style>
</head>
<body>
    <div class="header-section">
        <div class="header">Рейс ОК</div>
        <div class="sub-header">Логистика & Сервис</div>
    </div>

    <div class="input-group">
        <div class="label">Город отгрузки</div>
        <div class="select-wrapper">
            <select id="city">
                <option value="" disabled selected>Выберите город</option>
                <option value="Коледино">Коледино</option>
                <option value="Электросталь">Электросталь</option>
                <option value="Тула">Тула</option>
                <option value="Подольск">Подольск</option>
                <option value="Казань">Казань</option>
                <option value="Котовск">Котовск</option>
                <option value="Рязань">Рязань</option>
                <option value="Краснодар">Краснодар</option>
                <option value="Воронеж">Воронеж</option>
                <option value="Шушары">Шушары</option>
                <option value="Екатеринбург">Екатеринбург</option>
                <option value="Новосибирск">Новосибирск</option>
            </select>
        </div>
    </div>

    <div class="input-group">
        <div class="label">Дата отгрузки</div>
        <input type="date" id="date">
    </div>

    <div class="input-group">
        <div class="label">Тип поставки</div>
        <div class="select-wrapper">
            <select id="type">
                <option value="КОРОБ">📦 Короб</option>
                <option value="ПАЛЛЕТА">🏗️ Паллета</option>
            </select>
        </div>
    </div>

    <div class="input-group">
        <div class="label">Количество</div>
        <input type="number" id="qty" placeholder="Сколько везем?">
    </div>

    <div class="input-group">
        <div class="label">Организация</div>
        <input type="text" id="company" placeholder="ИНН или Название">
    </div>

    <div class="input-group">
        <div class="label">Телефон для связи</div>
        <input type="tel" id="phone" placeholder="+7 (___) ___-__-__">
    </div>

    <button class="btn" id="send">Забронировать</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Дата на завтра по умолчанию
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        document.getElementById('date').value = tomorrow.toISOString().split('T')[0];

        document.getElementById('send').addEventListener('click', () => {
            const data = {
                city: document.getElementById('city').value,
                date: document.getElementById('date').value,
                type: document.getElementById('type').value,
                qty: document.getElementById('qty').value,
                company: document.getElementById('company').value,
                phone: document.getElementById('phone').value
            };
            
            if (!data.city || !data.phone) {
                tg.HapticFeedback.notificationOccurred('error');
                tg.showAlert("Пожалуйста, заполните основные данные");
                return;
            }

            tg.HapticFeedback.impactOccurred('medium');
            tg.sendData(JSON.stringify(data));
        });
    </script>
</body>
</html>
