<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>РЕЙС ОК | BORK BLACK LUX</title>
    <script src="https://telegram.org"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body { 
            background: #000; color: #fff; 
            font-family: 'Inter', sans-serif; 
            margin: 0; padding: 24px; 
            -webkit-font-smoothing: antialiased;
        }

        /* Шапка: Крупнее и солиднее */
        .header-section { margin-bottom: 45px; text-align: center; border-bottom: 1px solid #222; padding-bottom: 25px; }
        .header { font-size: 34px; font-weight: 900; letter-spacing: 6px; text-transform: uppercase; }
        .sub-header { color: #666; font-size: 11px; letter-spacing: 4px; margin-top: 6px; font-weight: 700; }

        .input-group { margin-bottom: 35px; }
        .label { color: #888; font-size: 12px; margin-bottom: 14px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
        
        /* Поля: Крупный текст 18px */
        input, select { 
            width: 100%; background: #111; border: 1px solid #333; color: #fff; 
            padding: 20px; border-radius: 6px; box-sizing: border-box; 
            font-size: 18px; /* Увеличено */
            font-weight: 600; appearance: none;
        }
        input:focus, select:focus { border-color: #fff; outline: none; background: #161616; }

        /* Счетчик: Очень крупные кнопки и цифры */
        .counter-container {
            display: flex; align-items: center; justify-content: space-between;
            background: #111; border: 1px solid #333; border-radius: 10px; padding: 12px;
        }
        .counter-btn {
            width: 70px; height: 70px; background: #222; border: 1px solid #444;
            color: #fff; font-size: 32px; font-weight: 400; border-radius: 8px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .counter-btn:active { background: #fff; color: #000; }
        .counter-value { font-size: 34px; font-weight: 900; width: 60px; text-align: center; color: #fff; }

        /* Кнопка: Текст 16px, жирный */
        .btn-main { 
            width: 100%; background: #fff; color: #000; border: none; 
            padding: 24px; font-weight: 900; border-radius: 6px; 
            margin-top: 25px; font-size: 16px; text-transform: uppercase; letter-spacing: 3px;
        }
        .btn-main:active { opacity: 0.8; transform: translateY(1px); }

        ::placeholder { color: #444; }
    </style>
</head>
<body>
    <div class="header-section">
        <div class="header">РЕЙС ОК</div>
        <div class="sub-header">PREMIUM LOGISTICS</div>
    </div>

    <div class="input-group">
        <div class="label">Локация отгрузки</div>
        <select id="city">
            <option value="" disabled selected>— ВЫБРАТЬ —</option>
            <option value="Коледино">КОЛЕДИНО</option>
            <option value="Казань">КАЗАНЬ</option>
            <option value="Электросталь">ЭЛЕКТРОСТАЛЬ</option>
            <option value="Тула">ТУЛА</option>
            <option value="Подольск">ПОДОЛЬСК</option>
            <option value="Краснодар">КРАСНОДАР</option>
        </select>
    </div>

    <div class="input-group">
        <div class="label">Количество единиц</div>
        <div class="counter-container">
            <button class="counter-btn" onclick="updateQty(-1)">−</button>
            <div class="counter-value" id="qty_val">1</div>
            <button class="counter-btn" onclick="updateQty(1)">+</button>
        </div>
    </div>

    <div class="input-group">
        <div class="label">Тип поставки</div>
        <select id="type">
            <option value="КОРОБ">📦 КОРОБ</option>
            <option value="ПАЛЛЕТА">🏗️ ПАЛЛЕТА</option>
        </select>
    </div>

    <div class="input-group">
        <div class="label">Организация</div>
        <input type="text" id="company" placeholder="ИНН / НАЗВАНИЕ">
    </div>

    <div class="input-group">
        <div class="label">Контактный номер</div>
        <input type="tel" id="phone" placeholder="+7 ——— ——— —— ——">
    </div>

    <button class="btn-main" id="send">ПОДТВЕРДИТЬ</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let count = 1;
        function updateQty(val) {
            count = Math.max(1, count + val);
            document.getElementById('qty_val').innerText = count;
            tg.HapticFeedback.impactOccurred('heavy'); // Усиленный виброотклик
        }

        document.getElementById('send').addEventListener('click', () => {
            const data = {
                city: document.getElementById('city').value,
                qty: count,
                type: document.getElementById('type').value,
                company: document.getElementById('company').value,
                phone: document.getElementById('phone').value,
                date: "ЗАВТРА"
            };
            
            if (!data.city || !data.phone || !data.company) {
                tg.HapticFeedback.notificationOccurred('error');
                tg.showAlert("НЕОБХОДИМО ЗАПОЛНИТЬ ВСЕ ДАННЫЕ");
                return;
            }

            tg.HapticFeedback.notificationOccurred('success');
            tg.sendData(JSON.stringify(data));
        });
    </script>
</body>
</html>
