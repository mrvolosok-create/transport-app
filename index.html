<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>РЕЙС ОК | BORK COMPACT</title>
    <script src="https://telegram.org"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body { 
            background: #000; color: #fff; 
            font-family: 'Inter', sans-serif; 
            margin: 0; padding: 20px; 
            -webkit-font-smoothing: antialiased;
        }

        .header-section { margin-bottom: 30px; text-align: center; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .header { font-size: 28px; font-weight: 900; letter-spacing: 5px; text-transform: uppercase; }
        .sub-header { color: #666; font-size: 10px; letter-spacing: 3px; margin-top: 4px; font-weight: 700; }

        .input-group { margin-bottom: 20px; }
        .label { color: #888; font-size: 11px; margin-bottom: 10px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; }
        
        /* Сделал плашки чуть меньше (padding 16px вместо 20) */
        input, select { 
            width: 100%; background: #111; border: 1px solid #333; color: #fff; 
            padding: 16px; border-radius: 6px; box-sizing: border-box; 
            font-size: 16px; font-weight: 600; appearance: none;
        }
        input:focus, select:focus { border-color: #fff; outline: none; background: #161616; }
        input:disabled { color: #555; background: #0a0a0a; border-color: #222; }

        .counter-container {
            display: flex; align-items: center; justify-content: space-between;
            background: #111; border: 1px solid #333; border-radius: 8px; padding: 8px;
        }
        .counter-btn {
            width: 55px; height: 55px; background: #222; border: 1px solid #444;
            color: #fff; font-size: 28px; font-weight: 400; border-radius: 6px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .counter-btn:active { background: #fff; color: #000; }
        .counter-value { font-size: 28px; font-weight: 900; width: 50px; text-align: center; }

        .btn-main { 
            width: 100%; background: #fff; color: #000; border: none; 
            padding: 20px; font-weight: 900; border-radius: 6px; 
            margin-top: 20px; font-size: 15px; text-transform: uppercase; letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="header-section">
        <div class="header">РЕЙС ОК</div>
        <div class="sub-header">PREMIUM LOGISTICS</div>
    </div>

    <div class="input-group">
        <div class="label">Склад отгрузки</div>
        <select id="city">
            <option value="" disabled selected>— ВЫБРАТЬ —</option>
            <option value="Коледино">КОЛЕДИНО</option>
            <option value="Казань">КАЗАНЬ</option>
            <option value="Электросталь">ЭЛЕКТРОСТАЛЬ</option>
            <option value="Тула">ТУЛА</option>
            <option value="Подольск">ПОДОЛЬСК</option>
        </select>
    </div>

    <div class="input-group">
        <div class="label">Дата на склад РЕЙСОК</div>
        <input type="date" id="date_reisok" onchange="updateWBDate()">
    </div>

    <div class="input-group" style="opacity: 0.7;">
        <div class="label">Авто-дата отгрузки на ВБ</div>
        <input type="text" id="date_wb" disabled placeholder="Выберите дату выше">
    </div>

    <div class="input-group">
        <div class="label">Количество единиц</div>
        <div class="counter-container">
            <button type="button" class="counter-btn" onclick="updateQty(-1)">−</button>
            <div class="counter-value" id="qty_val">1</div>
            <button type="button" class="counter-btn" onclick="updateQty(1)">+</button>
        </div>
    </div>

    <div class="input-group">
        <div class="label">Тип поставки</div>
        <select id="type">
            <option value="КОРОБ">📦 КОРОБ</option>
            <option value="ПАЛЛЕТА">🏗️ ПАЛЛЕТА</option>
        </select>
    </div>

    <div class="input-group">
        <div class="label">Организация</div>
        <input type="text" id="company" placeholder="ИНН / НАЗВАНИЕ">
    </div>

    <div class="input-group">
        <div class="label">Контактный номер</div>
        <input type="tel" id="phone" placeholder="+7 ——— ——— —— ——">
    </div>

    <button type="button" class="btn-main" id="send">ПОДТВЕРДИТЬ</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let count = 1;
        function updateQty(val) {
            count = Math.max(1, count + val);
            document.getElementById('qty_val').innerText = count;
            tg.HapticFeedback.impactOccurred('medium');
        }

        // Логика автоматической даты ВБ
        function updateWBDate() {
            const dateInput = document.getElementById('date_reisok').value;
            if (!dateInput) return;

            const reisokDate = new Date(dateInput);
            const wbDate = new Date(reisokDate);
            wbDate.setDate(reisokDate.getDate() + 1); // Прибавляем 1 день

            const day = String(wbDate.getDate()).padStart(2, '0');
            const month = String(wbDate.getMonth() + 1).padStart(2, '0');
            const year = wbDate.getFullYear();

            document.getElementById('date_wb').value = `${day}.${month}.${year}`;
            tg.HapticFeedback.selectionChanged();
        }

        // Установка сегодняшней даты по умолчанию
        const today = new Date();
        document.getElementById('date_reisok').value = today.toISOString().split('T')[0];
        updateWBDate();

        document.getElementById('send').addEventListener('click', () => {
            const data = {
                city: document.getElementById('city').value,
                qty: count,
                type: document.getElementById('type').value,
                company: document.getElementById('company').value,
                phone: document.getElementById('phone').value,
                date_reisok: document.getElementById('date_reisok').value,
                date_wb: document.getElementById('date_wb').value
            };
            
            if (!data.city || !data.phone || !data.company || !data.date_reisok) {
                tg.HapticFeedback.notificationOccurred('error');
                tg.showAlert("НЕОБХОДИМО ЗАПОЛНИТЬ ВСЕ ДАННЫЕ");
                return;
            }

            tg.HapticFeedback.notificationOccurred('success');
            tg.sendData(JSON.stringify(data));
        });
    </script>
</body>
</html>
